# ===================================================================
# CONFIGURACIÓN - Catálogo de Libros POC
# Spring Boot + GraphQL + JPA + H2
# ===================================================================

# --- Nombre de la aplicación ---
spring.application.name=libros-poc

# ===================================================================
# BASE DE DATOS H2 EN MEMORIA
# ===================================================================
# URL de conexión: base de datos en memoria llamada "librosdb"
# DB_CLOSE_DELAY=-1 mantiene la BD activa mientras la JVM esté corriendo
spring.datasource.url=jdbc:h2:mem:librosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===================================================================
# JPA / HIBERNATE
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create-drop: crea el esquema al inicio y lo elimina al apagar
spring.jpa.hibernate.ddl-auto=create-drop
# Muestra las sentencias SQL generadas en la consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Mantiene la sesión JPA abierta durante el ciclo de vida del request HTTP
# Necesario para resolución lazy de relaciones en GraphQL
spring.jpa.open-in-view=true

# ===================================================================
# CONSOLA H2
# Accesible en: http://localhost:8085/h2-console
# JDBC URL: jdbc:h2:mem:librosdb
# ===================================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Puerto del servidor
server.port=8085

# ===================================================================
# GRAPHQL
# GraphiQL UI: http://localhost:8085/graphiql
# Endpoint GraphQL: http://localhost:8085/graphql (POST)
# ===================================================================
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
